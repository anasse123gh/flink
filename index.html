<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flink – تواصل بالاسم</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --bg2: #13161d;
    --bg3: #1a1e27;
    --bg4: #22273a;
    --accent: #5b7fff;
    --accent2: #a78bfa;
    --green: #4ade80;
    --red: #f87171;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --border: #2d3550;
    --bubble-me: #2a3a6b;
    --bubble-them: #1e2535;
    --shadow: 0 8px 32px rgba(0,0,0,0.5);
    --radius: 18px;
    --code-bg: #0a0c10;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; overflow:hidden; }

  body {
    font-family:'Cairo',sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* SPLASH SCREEN */
  #splash {
    position:fixed; inset:0; z-index:999;
    background:var(--bg);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:24px;
    transition:opacity .5s;
  }
  #splash.hidden { opacity:0; pointer-events:none; }
  .splash-logo {
    font-size:56px; font-weight:800; letter-spacing:-2px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .splash-tagline { color:var(--text2); font-size:15px; }

  /* LOGIN SCREEN */
  #login-screen {
    position:fixed; inset:0; z-index:100;
    background:var(--bg);
    display:flex; align-items:center; justify-content:center;
  }
  #login-screen.hidden { display:none; }
  .login-box {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:24px;
    padding:40px 48px;
    width:min(420px, 92vw);
    box-shadow:var(--shadow);
    display:flex; flex-direction:column; gap:20px;
  }
  .login-logo {
    font-size:36px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-align:center;
  }
  .login-sub { color:var(--text2); font-size:14px; text-align:center; }
  .field-group { display:flex; flex-direction:column; gap:8px; }
  .field-group label { font-size:13px; color:var(--text2); font-weight:600; }
  .field-group input {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:12px 16px;
    color:var(--text);
    font-family:'Cairo',sans-serif;
    font-size:14px;
    outline:none;
    direction:ltr;
    transition:border-color .2s;
  }
  .field-group input:focus { border-color:var(--accent); }
  .btn-primary {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff;
    border:none;
    border-radius:12px;
    padding:13px;
    font-family:'Cairo',sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .2s, transform .1s;
  }
  .btn-primary:hover { opacity:.9; }
  .btn-primary:active { transform:scale(.98); }
  .login-switch { color:var(--text3); font-size:13px; text-align:center; }
  .login-switch span { color:var(--accent); cursor:pointer; }
  .login-error { color:var(--red); font-size:13px; text-align:center; display:none; }

  /* APP LAYOUT */
  #app {
    display:flex;
    width:100vw; height:100vh;
    overflow:hidden;
  }
  #app.hidden { display:none; }

  /* SIDEBAR */
  .sidebar {
    width:320px; min-width:320px;
    background:var(--bg2);
    border-left:1px solid var(--border);
    display:flex; flex-direction:column;
    height:100%;
  }

  .sidebar-header {
    padding:20px 16px 12px;
    display:flex; align-items:center; gap:12px;
  }
  .sidebar-logo {
    font-size:22px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  }
  .sidebar-header-actions {
    margin-right:auto;
    display:flex; gap:8px;
  }
  .icon-btn {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:10px;
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:var(--text2);
    font-size:18px;
    transition:all .2s;
  }
  .icon-btn:hover { background:var(--bg4); color:var(--text); }

  .search-bar {
    margin:0 16px 12px;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:12px;
    display:flex; align-items:center; gap:10px;
    padding:0 14px;
  }
  .search-bar input {
    background:none; border:none; outline:none;
    color:var(--text); font-family:'Cairo',sans-serif;
    font-size:13px; padding:11px 0; flex:1; direction:rtl;
  }
  .search-bar input::placeholder { color:var(--text3); }

  .my-profile-card {
    margin:0 16px 16px;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:14px;
    padding:12px 14px;
    display:flex; align-items:center; gap:12px;
  }
  .my-profile-card .name { font-size:14px; font-weight:700; }
  .my-profile-card .uname { font-size:12px; color:var(--text3); direction:ltr; }

  .chats-list {
    flex:1; overflow-y:auto; padding:0 8px 12px;
    display:flex; flex-direction:column; gap:2px;
  }
  .chats-list::-webkit-scrollbar { width:4px; }
  .chats-list::-webkit-scrollbar-track { background:transparent; }
  .chats-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .chat-item {
    border-radius:14px;
    padding:12px 14px;
    display:flex; align-items:center; gap:12px;
    cursor:pointer;
    transition:background .15s;
  }
  .chat-item:hover { background:var(--bg3); }
  .chat-item.active { background:var(--bg4); }

  .chat-info { flex:1; min-width:0; }
  .chat-name { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-preview { font-size:12px; color:var(--text3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .chat-time { font-size:11px; color:var(--text3); white-space:nowrap; }
  .unread-badge {
    background:var(--accent);
    color:#fff;
    font-size:11px; font-weight:700;
    border-radius:50%;
    width:20px; height:20px;
    display:flex; align-items:center; justify-content:center;
  }

  .new-chat-btn {
    margin:0 16px 16px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none;
    border-radius:14px;
    padding:12px;
    color:#fff;
    font-family:'Cairo',sans-serif;
    font-weight:700; font-size:14px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
    transition:opacity .2s;
  }
  .new-chat-btn:hover { opacity:.9; }

  /* MAIN CHAT AREA */
  .chat-area {
    flex:1;
    display:flex; flex-direction:column;
    background:var(--bg);
    height:100%;
    min-width:0;
  }

  .chat-header {
    padding:16px 24px;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:14px;
    background:var(--bg2);
  }
  .chat-header-info { flex:1; }
  .chat-header-name { font-size:16px; font-weight:700; }
  .chat-header-status { font-size:12px; color:var(--text3); }

  .messages-area {
    flex:1; overflow-y:auto;
    padding:20px 24px;
    display:flex; flex-direction:column;
    gap:6px;
  }
  .messages-area::-webkit-scrollbar { width:4px; }
  .messages-area::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

  .msg-wrapper {
    display:flex;
    flex-direction:column;
    max-width:72%;
    animation:msgIn .2s ease;
  }
  @keyframes msgIn {
    from { opacity:0; transform:translateY(8px); }
    to { opacity:1; transform:translateY(0); }
  }
  .msg-wrapper.me { align-self:flex-start; }
  .msg-wrapper.them { align-self:flex-end; }

  .bubble {
    padding:10px 14px;
    border-radius:18px;
    font-size:14px;
    line-height:1.6;
    word-break:break-word;
  }
  .me .bubble {
    background:var(--bubble-me);
    border-radius:18px 18px 18px 4px;
    color:var(--text);
  }
  .them .bubble {
    background:var(--bubble-them);
    border-radius:18px 18px 4px 18px;
    color:var(--text);
    border:1px solid var(--border);
  }

  .msg-time {
    font-size:11px; color:var(--text3);
    margin-top:4px;
    padding:0 4px;
  }
  .me .msg-time { text-align:right; }
  .them .msg-time { text-align:left; }

  /* CODE BUBBLE */
  .code-bubble {
    border-radius:14px;
    overflow:hidden;
    border:1px solid var(--border);
    min-width:280px;
    max-width:100%;
  }
  .code-header {
    background:var(--bg4);
    padding:8px 14px;
    display:flex; align-items:center; justify-content:space-between;
    gap:10px;
  }
  .code-lang-badge {
    background:var(--accent);
    color:#fff;
    font-size:11px; font-weight:700;
    padding:2px 10px;
    border-radius:20px;
    font-family:'JetBrains Mono',monospace;
  }
  .copy-btn {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:8px;
    padding:4px 12px;
    font-size:12px;
    color:var(--text2);
    cursor:pointer;
    display:flex; align-items:center; gap:6px;
    transition:all .2s;
    font-family:'Cairo',sans-serif;
  }
  .copy-btn:hover { background:var(--bg2); color:var(--green); border-color:var(--green); }
  .copy-btn.copied { color:var(--green); border-color:var(--green); }
  .code-bubble pre {
    margin:0;
    max-height:400px;
    overflow:auto;
    background:var(--code-bg) !important;
  }
  .code-bubble pre::-webkit-scrollbar { width:6px; height:6px; }
  .code-bubble pre::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
  .code-bubble code {
    font-family:'JetBrains Mono',monospace !important;
    font-size:13px !important;
    padding:14px !important;
    display:block;
  }

  /* INPUT AREA */
  .input-area {
    padding:16px 24px;
    border-top:1px solid var(--border);
    background:var(--bg2);
  }
  .code-mode-indicator {
    background:var(--bg3);
    border:1px solid var(--accent);
    border-radius:10px 10px 0 0;
    padding:8px 14px;
    font-size:12px;
    color:var(--accent);
    display:flex; align-items:center; justify-content:space-between;
    display:none;
  }
  .code-mode-indicator.visible { display:flex; }
  .code-lang-select {
    background:var(--bg4);
    border:1px solid var(--border);
    border-radius:8px;
    color:var(--text);
    padding:3px 10px;
    font-size:12px;
    font-family:'Cairo',sans-serif;
    outline:none;
  }

  .input-row {
    display:flex; align-items:flex-end; gap:10px;
  }
  .input-wrap {
    flex:1;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:16px;
    padding:8px 14px;
    display:flex; flex-direction:column;
    transition:border-color .2s;
  }
  .input-wrap:focus-within { border-color:var(--accent); }
  .input-wrap.code-mode {
    border-radius:0 0 16px 16px;
    border-top:none;
    font-family:'JetBrains Mono',monospace;
  }
  #msg-input {
    background:none; border:none; outline:none;
    color:var(--text);
    font-family:'Cairo',sans-serif;
    font-size:14px;
    resize:none;
    max-height:180px;
    min-height:24px;
    line-height:1.5;
    direction:rtl;
  }
  .input-wrap.code-mode #msg-input {
    font-family:'JetBrains Mono',monospace;
    direction:ltr;
    font-size:13px;
  }
  #msg-input::placeholder { color:var(--text3); }

  .input-actions {
    display:flex; align-items:center; gap:8px;
    margin-top:8px;
  }
  .input-action-btn {
    background:none; border:none;
    color:var(--text3); cursor:pointer;
    font-size:18px; padding:2px;
    transition:color .2s;
    display:flex; align-items:center;
  }
  .input-action-btn:hover { color:var(--accent); }
  .input-action-btn.active { color:var(--accent); }

  .send-btn {
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border:none; border-radius:14px;
    width:46px; height:46px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:#fff; font-size:20px;
    transition:opacity .2s, transform .1s;
    flex-shrink:0;
  }
  .send-btn:hover { opacity:.9; }
  .send-btn:active { transform:scale(.95); }

  /* EMPTY STATE */
  .empty-state {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:12px; color:var(--text3);
  }
  .empty-state .logo {
    font-size:48px; font-weight:800;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    opacity:.3;
  }
  .empty-state p { font-size:15px; }

  /* AVATAR */
  .avatar {
    width:42px; height:42px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-weight:800; font-size:15px; flex-shrink:0;
  }
  .avatar-sm { width:32px; height:32px; font-size:12px; }
  .online-dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--green);
    border:2px solid var(--bg2);
    position:absolute; bottom:0; right:0;
  }
  .avatar-wrap { position:relative; }

  /* MODAL */
  .modal-overlay {
    position:fixed; inset:0; z-index:200;
    background:rgba(0,0,0,.6);
    display:flex; align-items:center; justify-content:center;
    backdrop-filter:blur(4px);
    display:none;
  }
  .modal-overlay.open { display:flex; }
  .modal {
    background:var(--bg2);
    border:1px solid var(--border);
    border-radius:20px;
    padding:28px 32px;
    width:min(400px,90vw);
    display:flex; flex-direction:column; gap:16px;
    box-shadow:var(--shadow);
  }
  .modal h3 { font-size:18px; font-weight:700; }
  .modal input {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 14px;
    color:var(--text);
    font-family:'Cairo',sans-serif;
    font-size:14px;
    outline:none;
    direction:ltr;
    width:100%;
    transition:border-color .2s;
  }
  .modal input:focus { border-color:var(--accent); }
  .modal-actions { display:flex; gap:10px; }
  .btn-secondary {
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:12px;
    padding:11px 20px;
    color:var(--text2);
    font-family:'Cairo',sans-serif;
    font-size:14px; font-weight:600;
    cursor:pointer;
    transition:background .2s;
    flex:1;
  }
  .btn-secondary:hover { background:var(--bg4); }
  .modal-error { color:var(--red); font-size:13px; display:none; }

  /* DATE DIVIDER */
  .date-divider {
    display:flex; align-items:center; gap:10px;
    color:var(--text3); font-size:12px;
    margin:8px 0;
  }
  .date-divider::before, .date-divider::after {
    content:''; flex:1; height:1px; background:var(--border);
  }

  /* TOAST */
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--bg4);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 20px;
    font-size:13px;
    z-index:999;
    opacity:0;
    transition:opacity .3s;
    pointer-events:none;
  }
  .toast.show { opacity:1; }
  .typing-indicator {
    display:flex; gap:4px; align-items:center; padding:4px 0;
  }
  .typing-dot {
    width:6px; height:6px; border-radius:50%;
    background:var(--text3);
    animation:typing .8s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay:.2s; }
  .typing-dot:nth-child(3) { animation-delay:.4s; }
  @keyframes typing {
    0%,60%,100% { transform:translateY(0); }
    30% { transform:translateY(-6px); }
  }

  @media(max-width:640px) {
    .sidebar { width:100%; min-width:100%; position:absolute; z-index:10; transition:transform .3s; }
    .sidebar.hidden-mobile { transform:translateX(100%); }
    .chat-area { width:100%; }
  }
</style>
</head>
<body>

<!-- Splash -->
<div id="splash">
  <div class="splash-logo">Flink</div>
  <div class="splash-tagline">تواصل بلا أرقام — فقط بالاسم ⚡</div>
</div>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">Flink ⚡</div>
    <div class="login-sub" id="login-sub">ادخل باسم المستخدم الخاص بك</div>

    <div id="login-form" style="display:flex;flex-direction:column;gap:16px;">
      <div class="field-group">
        <label>اسم المستخدم</label>
        <input type="text" id="login-username" placeholder="مثال: ahmed99" autocomplete="off" />
      </div>
      <div class="field-group">
        <label>الاسم المعروض</label>
        <input type="text" id="login-displayname" placeholder="مثال: أحمد" autocomplete="off" />
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-primary" onclick="handleLogin()">دخول / تسجيل</button>
    </div>

    <div class="login-switch">أو <span onclick="showJoinExisting()">الدخول بحساب موجود</span></div>
    <div style="color:var(--text3);font-size:11px;text-align:center;">لا يلزم رقم هاتف. فقط اسم المستخدم ⚡</div>
  </div>
</div>

<!-- App -->
<div id="app" class="hidden">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Flink ⚡</div>
      <div class="sidebar-header-actions">
        <div class="icon-btn" onclick="openNewChat()" title="محادثة جديدة">＋</div>
        <div class="icon-btn" onclick="logout()" title="خروج">⎋</div>
      </div>
    </div>

    <div class="my-profile-card">
      <div class="avatar-wrap">
        <div class="avatar avatar-sm" id="my-avatar" style="background:#2a3a6b;color:#7aa2ff">أ</div>
        <div class="online-dot"></div>
      </div>
      <div>
        <div class="name" id="my-display-name">—</div>
        <div class="uname" id="my-username">—</div>
      </div>
    </div>

    <div class="search-bar">
      <span style="color:var(--text3)">🔍</span>
      <input type="text" placeholder="بحث في المحادثات..." id="search-input" oninput="filterChats()">
    </div>

    <div class="chats-list" id="chats-list">
      <div style="color:var(--text3);font-size:13px;text-align:center;padding:24px">لا توجد محادثات بعد</div>
    </div>

    <button class="new-chat-btn" onclick="openNewChat()">
      ✉️ بدء محادثة جديدة
    </button>
  </div>

  <!-- Chat Area -->
  <div class="chat-area" id="chat-area">
    <div class="empty-state" id="empty-state">
      <div class="logo">Flink</div>
      <p>اختر محادثة أو ابدأ واحدة جديدة</p>
    </div>

    <div id="active-chat" style="display:none;flex-direction:column;height:100%;">
      <div class="chat-header">
        <div class="avatar-wrap">
          <div class="avatar" id="chat-avatar" style="background:#2a3a6b;color:#7aa2ff">؟</div>
          <div class="online-dot" id="chat-online-dot" style="display:none"></div>
        </div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chat-partner-name">—</div>
          <div class="chat-header-status" id="chat-partner-status">غير متصل</div>
        </div>
      </div>

      <div class="messages-area" id="messages-area"></div>

      <div class="input-area">
        <div class="code-mode-indicator" id="code-mode-bar">
          <span>🖥️ وضع الكود</span>
          <div style="display:flex;align-items:center;gap:10px;">
            <select class="code-lang-select" id="code-lang-select">
              <option value="csharp">C# (Unity)</option>
              <option value="javascript">JavaScript</option>
              <option value="python">Python</option>
              <option value="cpp">C++</option>
              <option value="java">Java</option>
              <option value="html">HTML</option>
              <option value="css">CSS</option>
              <option value="typescript">TypeScript</option>
              <option value="glsl">GLSL (Shader)</option>
              <option value="json">JSON</option>

<script>
const SUPABASE_URL = "https://hgojarevxqtjkxuzdwvr.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhnb2phcmV2eHF0amt4dXpkd3ZyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA0ODA3OTUsImV4cCI6MjA4NjA1Njc5NX0.JUMswjN1wg1_uXJFDLCGa_Ha9eqGIfGQCXrxhaWh2iE";
const headers = { "Content-Type":"application/json", "apikey":SUPABASE_KEY, "Authorization":"Bearer "+SUPABASE_KEY, "Prefer":"return=representation" };

let currentUser = null;
let currentConversation = null;
let conversations = [];

let userChannel = null;

// --- SUPABASE HELPERS ---
async function sb(path, opts={}) {
  const r = await fetch(SUPABASE_URL+path, { headers, ...opts });
  if(!r.ok) { const e = await r.json(); throw e; }
  return r.json();
}

async function sbPost(path, body, method='POST') {
  return sb(path, { method, headers:{...headers,"Prefer":"return=representation"}, body:JSON.stringify(body) });
}

// --- AUTH ---
async function handleLogin() {
  const username = document.getElementById('login-username').value.trim().toLowerCase();
  const displayName = document.getElementById('login-displayname').value.trim();
  const err = document.getElementById('login-error');
  err.style.display = 'none';

  if(!username || !displayName) { showErr(err,'الرجاء تعبئة جميع الحقول'); return; }
  if(!/^[a-z0-9_]{3,20}$/.test(username)) { showErr(err,'اسم المستخدم: أحرف إنجليزية صغيرة وأرقام وشرطة سفلية (3-20 حرف)'); return; }

  try {
    // Check if user exists
    const existing = await sb(`/rest/v1/users?username=eq.${username}&select=*`);
    let user;
    if(existing.length > 0) {
      // Update display name and mark online
      const updated = await sb(`/rest/v1/users?id=eq.${existing[0].id}`, {
        method:'PATCH',
        headers:{...headers,"Prefer":"return=representation"},
        body:JSON.stringify({display_name:displayName, is_online:true, last_seen:new Date().toISOString()})
      });
      user = updated[0];
    } else {
      const colors = ['#1a3a6b','#1a4a3b','#3a1a6b','#4a2a1a','#1a4a5a'];
      const color = colors[Math.floor(Math.random()*colors.length)];
      const created = await sbPost('/rest/v1/users', {
        username, display_name:displayName, avatar_color:color, is_online:true
      });
      user = created[0];
    }
    currentUser = user;
    localStorage.setItem('flink_user_id', user.id);
    localStorage.setItem('flink_username', user.username);
    localStorage.setItem('flink_display_name', user.display_name);
    enterApp();
  } catch(e) {
    showErr(err, e.message || 'خطأ في الاتصال، حاول مجدداً');
  }
}

function showErr(el, msg) { el.textContent=msg; el.style.display='block'; }
function showJoinExisting() {
  document.getElementById('login-displayname').parentElement.style.opacity='.5';
}

  if(currentUser) {
    await sb(`/rest/v1/users?id=eq.${currentUser.id}`, {
      method:'PATCH', headers:{...headers,"Prefer":"return=representation"},

  }
  if(realtimeChannel) { leaveRealtime(); }

}

// --- APP INIT ---
async function init() {
  setTimeout(()=>{ document.getElementById('splash').classList.add('hidden'); },1500);
  const savedId = localStorage.getItem('flink_user_id');
  if(savedId) {
    try {
      const u = await sb(`/rest/v1/users?id=eq.${savedId}&select=*`);
      if(u.length>0) {
        currentUser = u[0];
        await sb(`/rest/v1/users?id=eq.${currentUser.id}`, {
          method:'PATCH', headers:{...headers,"Prefer":"return=representation"},

        });
        enterApp(); return;
      }
    } catch(e){}
  }
  setTimeout(()=>{ document.getElementById('login-screen').classList.remove('hidden'); },1600);
}

function enterApp() {
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  updateMyProfile();
  loadConversations();
  setupOnlineStatus();
  subscribeToNewMessages();
}

function updateMyProfile() {
  document.getElementById('my-display-name').textContent = currentUser.display_name;
  document.getElementById('my-username').textContent = '@'+currentUser.username;
  const av = document.getElementById('my-avatar');

  av.style.background = currentUser.avatar_color || '#1a3a6b';

}

// --- CONVERSATIONS ---
async function loadConversations() {
  try {
    // Get all conversation IDs where current user is a participant
    const parts = await sb(`/rest/v1/conversation_participants?user_id=eq.${currentUser.id}&select=conversation_id`);
    if(parts.length===0) { renderChats([]); return; }

    const convIds = parts.map(p=>p.conversation_id);
    const inClause = convIds.map(id=>`"${id}"`).join(',');

    // Get all participants for these conversations (to find the other person)
    const allParts = await sb(`/rest/v1/conversation_participants?conversation_id=in.(${convIds.join(',')})&select=*`);

    // Get partner user IDs
    const partnerIds = allParts
      .filter(p=>p.user_id !== currentUser.id)
      .map(p=>p.user_id);

    const uniquePartnerIds = [...new Set(partnerIds)];
    if(uniquePartnerIds.length===0) { renderChats([]); return; }

    const partnerUsers = await sb(`/rest/v1/users?id=in.(${uniquePartnerIds.join(',')})&select=*`);

    // Get last message per conversation
    const convsData = [];
    for(const convId of convIds) {
      const msgs = await sb(`/rest/v1/messages?conversation_id=eq.${convId}&order=created_at.desc&limit=1&select=*`);
      const pId = allParts.find(p=>p.conversation_id===convId && p.user_id!==currentUser.id)?.user_id;
      const partner = partnerUsers.find(u=>u.id===pId);
      if(partner) {
        convsData.push({
          id:convId,
          partner,
          lastMessage:msgs[0]||null
        });
      }
    }

    // Sort by last message time
    convsData.sort((a,b)=>{
      const ta = a.lastMessage?.created_at || '0';
      const tb = b.lastMessage?.created_at || '0';
      return tb.localeCompare(ta);
    });

    conversations = convsData;
    renderChats(convsData);
  } catch(e) {
    console.error(e);
  }
}

function renderChats(list) {
  const el = document.getElementById('chats-list');
  if(list.length===0) {
    el.innerHTML = '<div style="color:var(--text3);font-size:13px;text-align:center;padding:24px">لا توجد محادثات بعد</div>';
    return;
  }
  el.innerHTML = list.map(c=>`
    <div class="chat-item ${currentConversation?.id===c.id?'active':''}"
      onclick="openConversation('${c.id}')">
      <div class="avatar-wrap">
        <div class="avatar avatar-sm"
          style="background:${c.partner.avatar_color||'#1a3a6b'};color:#7aa2ff">
          ${c.partner.display_name[0]}
        </div>
        ${c.partner.is_online?'<div class="online-dot"></div>':''}
      </div>
      <div class="chat-info">
        <div class="chat-name">${escHtml(c.partner.display_name)}</div>
        <div class="chat-preview">${c.lastMessage ? (c.lastMessage.message_type==='code'?'📎 كود برمجي':escHtml(c.lastMessage.content.substring(0,40))) : 'لا رسائل'}</div>
      </div>
      <div class="chat-time">${c.lastMessage ? formatTime(c.lastMessage.created_at) : ''}</div>
    </div>
  `).join('');
}

function filterChats() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = conversations.filter(c=>
    c.partner.display_name.toLowerCase().includes(q) ||
    c.partner.username.toLowerCase().includes(q)
  );
  renderChats(filtered);
}

// --- OPEN CONVERSATION ---
async function openConversation(convId) {
  const conv = conversations.find(c=>c.id===convId);
  if(!conv) return;
  currentConversation = conv;

  document.getElementById('empty-state').style.display='none';
  const ac = document.getElementById('active-chat');
  ac.style.display='flex';

  document.getElementById('chat-partner-name').textContent = conv.partner.display_name + ' (@'+conv.partner.username+')';
  document.getElementById('chat-partner-status').textContent = conv.partner.is_online ? '🟢 متصل الآن' : 'آخر ظهور: '+formatTime(conv.partner.last_seen);
  const av = document.getElementById('chat-avatar');
  av.textContent = conv.partner.display_name[0];
  av.style.background = conv.partner.avatar_color || '#1a3a6b';
  av.style.color = '#7aa2ff';
  if(conv.partner.is_online) document.getElementById('chat-online-dot').style.display='block';
  else document.getElementById('chat-online-dot').style.display='none';

  renderChats(conversations);
  await loadMessages(convId);
  subscribeToConversation(convId);
}

async function loadMessages(convId) {
  const area = document.getElementById('messages-area');
  area.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:20px">جاري التحميل...</div>';
  try {
    const msgs = await sb(`/rest/v1/messages?conversation_id=eq.${convId}&order=created_at.asc&select=*`);
    renderMessages(msgs);
  } catch(e) { area.innerHTML = ''; }
}

function renderMessages(msgs) {
  const area = document.getElementById('messages-area');
  if(msgs.length===0) {
    area.innerHTML = '<div style="text-align:center;color:var(--text3);font-size:13px;padding:40px">لا رسائل بعد — ابدأ المحادثة!</div>';
    return;
  }

  let html = '';
  let lastDate = '';
  msgs.forEach(msg => {
    const msgDate = new Date(msg.created_at).toLocaleDateString('ar-SA',{day:'numeric',month:'long'});
    if(msgDate !== lastDate) {
      html += `<div class="date-divider">${msgDate}</div>`;
      lastDate = msgDate;
    }
    const isMe = msg.sender_id === currentUser.id;
    const side = isMe ? 'me' : 'them';
    const time = formatTime(msg.created_at);

    if(msg.message_type === 'code') {
      const lang = msg.code_language || 'plaintext';
      html += `
        <div class="msg-wrapper ${side}">
          <div class="code-bubble">
            <div class="code-header">
              <span class="code-lang-badge">${lang}</span>
              <button class="copy-btn" onclick="copyCode(this,'${escAttr(msg.id)}')">
                📋 نسخ
              </button>
            </div>
            <pre><code id="code-${msg.id}" class="language-${lang}">${escHtml(msg.content)}</code></pre>
          </div>
          <div class="msg-time">${time} ${isMe ? (msg.is_read?'✓✓':'✓'):''}
          </div>
        </div>`;
    } else {
      html += `
        <div class="msg-wrapper ${side}">
          <div class="bubble">${escHtml(msg.content)}</div>
          <div class="msg-time">${time} ${isMe ? (msg.is_read?'✓✓':'✓'):''}
          </div>
        </div>`;
    }
  });
  area.innerHTML = html;

  // Highlight code blocks
  area.querySelectorAll('pre code').forEach(el=>{ hljs.highlightElement(el); });
  area.scrollTop = area.scrollHeight;
}

function copyCode(btn, msgId) {
  const codeEl = document.getElementById('code-'+msgId);
  if(!codeEl) return;
  navigator.clipboard.writeText(codeEl.innerText).then(()=>{
    btn.innerHTML = '✅ تم النسخ';
    btn.classList.add('copied');
    setTimeout(()=>{ btn.innerHTML='📋 نسخ'; btn.classList.remove('copied'); },2000);
  });
}

// --- SEND MESSAGE ---
let isCodeMode = false;

function toggleCodeMode() {
  isCodeMode = !isCodeMode;
  document.getElementById('code-mode-bar').classList.toggle('visible', isCodeMode);
  document.getElementById('input-wrap').classList.toggle('code-mode', isCodeMode);
  document.getElementById('code-mode-btn').classList.toggle('active', isCodeMode);
  const input = document.getElementById('msg-input');
  input.placeholder = isCodeMode ? '// الصق كودك هنا...' : 'اكتب رسالتك...';
  input.focus();
}

async function sendMessage() {
  if(!currentConversation) return;
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if(!content) return;

  const lang = document.getElementById('code-lang-select').value;
  const msgData = {
    conversation_id: currentConversation.id,
    sender_id: currentUser.id,
    content: content,
    message_type: isCodeMode ? 'code' : 'text',
    code_language: isCodeMode ? lang : null
  };

  input.value = '';
  input.style.height = 'auto';

  try {
    await sbPost('/rest/v1/messages', msgData);
    // Realtime will catch it, but also reload for safety
  } catch(e) {
    showToast('فشل الإرسال، حاول مجدداً');
  }
}

function handleKeyDown(e) {
  if(e.key==='Enter' && !e.shiftKey && !isCodeMode) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,180)+'px';
}

// --- NEW CHAT ---
function openNewChat() {
  document.getElementById('new-chat-username').value='';
  document.getElementById('new-chat-error').style.display='none';
  document.getElementById('new-chat-modal').classList.add('open');
  setTimeout(()=>document.getElementById('new-chat-username').focus(),100);
}

async function startNewChat() {
  const username = document.getElementById('new-chat-username').value.trim().toLowerCase();
  const err = document.getElementById('new-chat-error');
  err.style.display='none';
  if(!username) { showErr(err,'أدخل اسم المستخدم'); return; }
  if(username===currentUser.username) { showErr(err,'لا يمكنك مراسلة نفسك!'); return; }

  try {
    const users = await sb(`/rest/v1/users?username=eq.${username}&select=*`);
    if(users.length===0) { showErr(err,'المستخدم غير موجود'); return; }
    const partner = users[0];

    // Check if conversation exists
    const myParts = await sb(`/rest/v1/conversation_participants?user_id=eq.${currentUser.id}&select=conversation_id`);
    const partnerParts = await sb(`/rest/v1/conversation_participants?user_id=eq.${partner.id}&select=conversation_id`);
    const myIds = new Set(myParts.map(p=>p.conversation_id));
    const existing = partnerParts.find(p=>myIds.has(p.conversation_id));

    let convId;
    if(existing) {
      convId = existing.conversation_id;
    } else {
      const newConv = await sbPost('/rest/v1/conversations', {});
      convId = newConv[0].id;
      await sbPost('/rest/v1/conversation_participants', {conversation_id:convId, user_id:currentUser.id});
      await sbPost('/rest/v1/conversation_participants', {conversation_id:convId, user_id:partner.id});
    }

    closeModal('new-chat-modal');
    await loadConversations();
    await openConversation(convId);
  } catch(e) {
    showErr(err, e.message||'خطأ في الاتصال');
  }
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

// --- REALTIME ---
let ws = null;
let wsConvId = null;

function subscribeToConversation(convId) {
  if(wsConvId===convId) return;
  if(ws) { ws.close(); ws=null; }
  wsConvId = convId;

  const channelId = 'flink-conv-'+convId+'-'+Date.now();
  const wsUrl = SUPABASE_URL.replace('https','wss')+'/realtime/v1/websocket?apikey='+SUPABASE_KEY+'&vsn=1.0.0';

  ws = new WebSocket(wsUrl);

  ws.onopen = ()=>{
    ws.send(JSON.stringify({topic:'realtime:public:messages:conversation_id=eq.'+convId, event:'phx_join', payload:{}, ref:'1'}));
  };

  ws.onmessage = async (e)=>{
    const msg = JSON.parse(e.data);
    if(msg.event==='INSERT' && msg.payload?.record) {
      const record = msg.payload.record;
      if(record.conversation_id===convId) {
        // Append single message
        appendMessage(record);
        // If from partner, mark as read
        if(record.sender_id!==currentUser.id) {
          sb(`/rest/v1/messages?id=eq.${record.id}`,{
            method:'PATCH',headers:{...headers,"Prefer":"return=representation"},
            body:JSON.stringify({is_read:true})
          }).catch(()=>{});
        }
        // Refresh chat list
        loadConversations();
      }
    }
  };

  ws.onerror = ()=>{};
  ws.onclose = ()=>{ ws=null; wsConvId=null; };
}

function subscribeToNewMessages() {
  // Poll for new messages in sidebar every 8 seconds
  setInterval(()=>{ if(currentUser) loadConversations(); }, 8000);
}

function appendMessage(msg) {
  const area = document.getElementById('messages-area');
  const noMsg = area.querySelector('[style*="ابدأ المحادثة"]');
  if(noMsg) noMsg.remove();

  const isMe = msg.sender_id === currentUser.id;
  const side = isMe ? 'me' : 'them';
  const time = formatTime(msg.created_at);
  const div = document.createElement('div');

  if(msg.message_type==='code') {
    const lang = msg.code_language||'plaintext';
    div.className=`msg-wrapper ${side}`;
    div.innerHTML=`
      <div class="code-bubble">
        <div class="code-header">
          <span class="code-lang-badge">${lang}</span>
          <button class="copy-btn" onclick="copyCode(this,'${escAttr(msg.id)}')">📋 نسخ</button>
        </div>
        <pre><code id="code-${msg.id}" class="language-${lang}">${escHtml(msg.content)}</code></pre>
      </div>
      <div class="msg-time">${time}</div>`;
    area.appendChild(div);
    div.querySelectorAll('pre code').forEach(el=>hljs.highlightElement(el));
  } else {
    div.className=`msg-wrapper ${side}`;
    div.innerHTML=`<div class="bubble">${escHtml(msg.content)}</div><div class="msg-time">${time}</div>`;
    area.appendChild(div);
  }
  area.scrollTop=area.scrollHeight;
}

function leaveRealtime() { if(ws){ws.close();ws=null;wsConvId=null;} }

// --- ONLINE STATUS ---
function setupOnlineStatus() {
  // Update last_seen every 30 seconds
  setInterval(()=>{
    if(currentUser) {
      sb(`/rest/v1/users?id=eq.${currentUser.id}`,{
        method:'PATCH',headers:{...headers,"Prefer":"return=representation"},
        body:JSON.stringify({is_online:true,last_seen:new Date().toISOString()})
      }).catch(()=>{});
    }
  },30000);

  window.addEventListener('beforeunload',()=>{
    if(currentUser) {
      navigator.sendBeacon(
        SUPABASE_URL+`/rest/v1/users?id=eq.${currentUser.id}`,
        JSON.stringify({is_online:false,last_seen:new Date().toISOString()})
      );
    }
  });
}

// --- UTILS ---
function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}
function escAttr(str) { return String(str).replace(/'/g,"\\'"); }

function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if(diff < 60000) return 'الآن';
  if(diff < 3600000) return Math.floor(diff/60000)+'د';
  if(d.toDateString()===now.toDateString()) return d.toLocaleTimeString('ar',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ar-SA',{day:'numeric',month:'short'});
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// Handle Enter in modal
document.getElementById('new-chat-username').addEventListener('keydown',e=>{
  if(e.key==='Enter') startNewChat();
});

// INIT
init();
</script>
